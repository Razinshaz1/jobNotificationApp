<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Notification App - Design System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-nav" role="banner">
        <div class="top-nav-row">
          <div class="brand">Job Notification App</div>
          <button
            type="button"
            class="menu-toggle"
            aria-expanded="false"
            aria-controls="mobile-nav-panel"
            aria-label="Open navigation menu"
          >
            Menu
          </button>
          <nav class="nav-links desktop-nav" aria-label="Primary Navigation">
            <a href="/dashboard" data-route="/dashboard">Dashboard</a>
            <a href="/saved" data-route="/saved">Saved</a>
            <a href="/digest" data-route="/digest">Digest</a>
            <a href="/settings" data-route="/settings">Settings</a>
            <a href="/proof" data-route="/proof">Proof</a>
          </nav>
        </div>
        <nav id="mobile-nav-panel" class="mobile-nav" aria-label="Mobile Navigation">
          <a href="/dashboard" data-route="/dashboard">Dashboard</a>
          <a href="/saved" data-route="/saved">Saved</a>
          <a href="/digest" data-route="/digest">Digest</a>
          <a href="/settings" data-route="/settings">Settings</a>
          <a href="/proof" data-route="/proof">Proof</a>
        </nav>
      </header>

      <main id="route-view" class="route-view" aria-live="polite"></main>
    </div>

    <div id="toast-region" class="toast-region" aria-live="polite" aria-atomic="true"></div>

    <div id="job-modal" class="modal" hidden aria-hidden="true">
      <div class="modal-backdrop" data-close-modal tabindex="-1"></div>
      <div
        class="modal-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title-heading"
      >
        <div class="modal-header">
          <h2 id="modal-title-heading" class="modal-title" data-modal-title></h2>
          <button type="button" class="modal-close" data-close-modal aria-label="Close dialog">
            ×
          </button>
        </div>
        <p class="modal-meta" data-modal-meta></p>
        <div class="modal-body">
          <h3 class="modal-section-title">Description</h3>
          <div class="modal-description" data-modal-description></div>
          <h3 class="modal-section-title">Skills</h3>
          <ul class="skill-list" data-modal-skills></ul>
        </div>
      </div>
    </div>

    <script src="./jobs-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
